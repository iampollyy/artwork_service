# Azure Pipeline – ArtworkService
# Stage 1: Lint (syntax check) + Unit Tests with artifact publishing
# Stage 2: Build & Package

trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:

# ======================== STAGE 1 – Lint & Test ========================
- stage: Lint_and_Test
  displayName: "Syntax Check & Unit Tests"
  jobs:
  - job: LintAndTest
    displayName: "Lint Python files & run pytest"
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
      displayName: "Use Python 3.11"

    - script: |
        python -m pip install --upgrade pip
        pip install pyflakes pytest httpx fastapi sqlalchemy pydantic python-dotenv
      displayName: "Install dependencies"

    - script: |
        echo "=== Syntax check with py_compile ==="
        python -m py_compile main.py
        python -m py_compile models.py
        python -m py_compile schemas.py
        python -m py_compile database.py
        python -m py_compile seed.py
        echo "=== Pyflakes static analysis ==="
        python -m pyflakes main.py models.py schemas.py database.py seed.py
      displayName: "Syntax & lint check"

    - script: |
        python -m pytest tests/ -v --tb=short --junitxml=test-results/results.xml
      displayName: "Run unit tests"

    - task: PublishTestResults@2
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'test-results/results.xml'
        testRunTitle: 'ArtworkService Unit Tests'
      displayName: "Publish test results"

    - publish: test-results
      artifact: TestResults
      condition: always()
      displayName: "Upload test results as artifact"

# ======================== STAGE 2 – Build & Package ========================
- stage: Build
  displayName: "Build & Package"
  dependsOn: Lint_and_Test
  condition: succeeded()
  jobs:
  - job: Package
    displayName: "Create deployment package"
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
      displayName: "Use Python 3.11"

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements
      displayName: "Install production dependencies"

    - script: |
        mkdir -p $(Build.ArtifactStagingDirectory)/app
        cp -r *.py requirements tests/ $(Build.ArtifactStagingDirectory)/app/
      displayName: "Copy source to staging"

    - publish: $(Build.ArtifactStagingDirectory)/app
      artifact: ArtworkServicePackage
      displayName: "Publish application artifact"
