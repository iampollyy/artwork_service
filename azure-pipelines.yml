# Azure Pipeline - ArtworkService
# Stage 1: Lint + tests
# Stage 2: Docker build + push to Azure Container Registry
# Stage 3: Deploy to Azure Container Apps

trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.11'
  dockerRegistryServiceConnection: 'CHANGE_ME_ACR_SERVICE_CONNECTION'
  azureSubscription: 'CHANGE_ME_AZURE_RM_SERVICE_CONNECTION'
  acrLoginServer: 'CHANGE_ME.azurecr.io'
  imageRepository: 'artwork-service'
  containerAppName: 'artwork-service'
  resourceGroup: 'CHANGE_ME_RESOURCE_GROUP'

stages:
  - stage: Lint_and_Test
    displayName: "Syntax Check & Unit Tests"
    jobs:
      - job: LintAndTest
        displayName: "Lint Python files & run pytest"
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: "Use Python $(pythonVersion)"

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt pyflakes
            displayName: "Install dependencies"

          - script: |
              echo "=== Syntax check with py_compile ==="
              python -m py_compile main.py
              python -m py_compile models.py
              python -m py_compile schemas.py
              python -m py_compile database.py
              python -m py_compile seed.py
              python -m py_compile business.py
              echo "=== Pyflakes static analysis ==="
              python -m pyflakes main.py models.py schemas.py database.py seed.py business.py
            displayName: "Syntax & lint check"

          - script: |
              python -m pytest tests/ -v --tb=short --junitxml=test-results/results.xml
            displayName: "Run unit tests"

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/results.xml'
              testRunTitle: 'ArtworkService Unit Tests'
            displayName: "Publish test results"

          - publish: test-results
            artifact: TestResults
            condition: always()
            displayName: "Upload test results as artifact"

  - stage: Docker_Build
    displayName: "Docker Build & Push"
    dependsOn: Lint_and_Test
    condition: succeeded()
    jobs:
      - job: BuildAndPush
        displayName: "Build and push Docker image"
        steps:
          - task: Docker@2
            displayName: "Build and push image to ACR"
            inputs:
              command: buildAndPush
              repository: '$(imageRepository)'
              dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: "Deploy to Azure Container Apps"
    dependsOn: Docker_Build
    condition: succeeded()
    jobs:
      - job: DeployContainerApp
        displayName: "Deploy container app"
        steps:
          - task: AzureContainerApps@1
            displayName: "Deploy ArtworkService"
            inputs:
              azureSubscription: '$(azureSubscription)'
              imageToDeploy: '$(acrLoginServer)/$(imageRepository):$(Build.BuildId)'
              containerAppName: '$(containerAppName)'
              resourceGroup: '$(resourceGroup)'
